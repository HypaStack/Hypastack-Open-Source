name = "r2-gateway"
main = "worker.js"
compatibility_date = "2024-01-01"

# Route to your R2 custom domain
routes = [
  { pattern = "r2.hypastack.com/*", zone_name = "hypastack.com" }
]

# Bind to your R2 bucket — replace with your actual bucket name
[[r2_buckets]]
binding = "R2_BUCKET"
bucket_name = "hypastack-upload"
jurisdiction = "eu"

# Secret bindings — set via: npx wrangler secret put AVATAR_SIGNING_SECRET
# Must match AVATAR_SIGNING_SECRET in your Next.js .env
