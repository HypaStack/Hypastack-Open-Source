name: Deploy Hypastack

on:
  push:
    branches: [ main ]
    paths-ignore:
      - 'README.md'
      - 'docs/**'
      - '**/*.md'

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to VPS
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SERVER_IP }}
          port: ${{ secrets.SSH_PORT }}
          username: ubuntu
          key: ${{ secrets.SSH_KEY }}
          script: |
            cd ~/Hypastack-Open-Source
            git fetch origin
            git reset --hard origin/main
            export PATH=$PATH:/home/ubuntu/.nvm/versions/node/v24.16.0/bin
            rm -rf .next node_modules
            npm install
            npm run build
            pm2 restart hypastack

