name: Deploy Hypastack

# Auto-deploy now runs on the VPS itself: a systemd user timer polls origin/main
# and rebuilds on change (see /home/ubuntu/deploy-hypastack.sh). That keeps the
# deploy off the inbound-SSH path from GitHub runners, whose shared Azure IPs
# intermittently land in the VPS's CrowdSec blocklist and get dropped. This
# workflow is kept only as a manual fallback.
on:
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to VPS
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SERVER_IP }}
          port: ${{ secrets.SSH_PORT }}
          username: ubuntu
          key: ${{ secrets.SSH_KEY }}
          script: |
            export XDG_RUNTIME_DIR=/run/user/$(id -u)
            cd ~/Hypastack-Open-Source
            git fetch origin
            git reset --hard origin/main
            mkdir -p /home/ubuntu/hypahash/run
            podman build --network=host -t localhost/hypahash:latest ./services/hypahash
            podman build --network=host -t localhost/hypastack:latest .
            systemctl --user restart hypahash.service
            systemctl --user restart hypastack.service
            podman image prune -f
